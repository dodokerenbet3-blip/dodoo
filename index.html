<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iCam Pro Video 4K</title>
    <style>
        :root { --red: #ff3b30; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Viewfinder */
        .camera-box { position: relative; flex: 1; margin: 8px; border-radius: 40px; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Recording Indicator */
        .rec-tag { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; font-size: 12px; display: none; align-items: center; gap: 8px; border: 1px solid var(--red); color: var(--red); font-weight: bold; }
        .dot { width: 8px; height: 8px; background: var(--red); border-radius: 50%; animation: blink 1s infinite; }

        /* UI Controls */
        .controls { height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .action-bar { width: 100%; display: flex; justify-content: space-around; align-items: center; padding: 0 30px; }
        
        .shutter-btn { width: 75px; height: 75px; border-radius: 50%; background: #fff; border: 4px solid #000; outline: 3px solid #fff; cursor: pointer; transition: 0.3s; }
        .recording { background: var(--red) !important; outline-color: var(--red) !important; border-radius: 15px !important; transform: scale(0.85); }

        .btn-side { width: 50px; height: 50px; background: #1c1c1e; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .preview-img { width: 50px; height: 50px; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        .preview-img img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        #flash { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>

    <div style="height: 50px; display: flex; justify-content: center; align-items: center; font-size: 12px; font-weight: bold;">4K ULTRA HD</div>

    <div class="camera-box">
        <div id="flash"></div>
        <div class="rec-tag" id="recTag"><div class="dot"></div> REC 00:00</div>
        <video id="v" autoplay playsinline muted></video>
    </div>

    <div class="controls">
        <div style="font-size: 11px; letter-spacing: 1px; color: #888;">VIDEO &nbsp; <span style="color:white">PHOTO</span> &nbsp; PORTRAIT</div>
        <div class="action-bar">
            <div class="preview-img"><img id="p" src=""></div>
            <div class="shutter-btn" id="shutter"></div>
            <div class="btn-side" id="flip">🔄</div>
        </div>
    </div>

    <canvas id="c" style="display:none;"></canvas>

    <script>
        const v = document.getElementById('v'), c = document.getElementById('c'), shutter = document.getElementById('shutter');
        const p = document.getElementById('p'), f = document.getElementById('flash'), recTag = document.getElementById('recTag');
        let isFront = false, stream, recorder, chunks = [], isRecording = false;

        async function init() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            try {
                // Konfigurasi 4K UHD Ultra Smooth
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: isFront ? "user" : "environment", width: { ideal: 3840 }, height: { ideal: 2160 }, frameRate: { ideal: 60 } },
                    audio: true
                });
                v.srcObject = stream;
            } catch (err) { alert("Error: Pastikan menggunakan HTTPS atau Localhost."); }
        }

        // Fungsi Foto
        function takePhoto() {
            f.style.opacity = '1';
            setTimeout(() => f.style.opacity = '0', 80);
            c.width = v.videoWidth; c.height = v.videoHeight;
            const ctx = c.getContext('2d');
            if (isFront) { ctx.translate(c.width, 0); ctx.scale(-1, 1); }
            ctx.drawImage(v, 0, 0);
            const data = c.toDataURL("image/jpeg", 1.0);
            p.src = data;
            save(data, `IMG_${Date.now()}.jpg`);
        }

        // Fungsi Video Ultra 4K
        function toggleVideo() {
            if (!isRecording) {
                // Start Recording
                chunks = [];
                recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 25000000 });
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/mp4' });
                    save(URL.createObjectURL(blob), `VID_4K_${Date.now()}.mp4`);
                };
                recorder.start();
                isRecording = true;
                shutter.classList.add('recording');
                recTag.style.display = 'flex';
            } else {
                // Stop Recording
                recorder.stop();
                isRecording = false;
                shutter.classList.remove('recording');
                recTag.style.display = 'none';
            }
        }

        // Logika Tombol: Klik = Foto, Tahan = Video
        let pressTimer;
        shutter.onmousedown = shutter.ontouchstart = (e) => {
            if (isRecording) return;
            pressTimer = setTimeout(() => {
                toggleVideo();
            }, 500); // Tahan 0.5 detik untuk Video
        };

        shutter.onmouseup = shutter.ontouchend = (e) => {
            clearTimeout(pressTimer);
            if (isRecording) {
                toggleVideo(); // Berhenti rekam saat dilepas
            } else if (!isRecording) {
                takePhoto(); // Klik biasa untuk foto
            }
        };

        function save(url, name) {
            const a = document.createElement('a');
            a.href = url; a.download = name; a.click();
        }

        document.getElementById('flip').onclick = () => { isFront = !isFront; init(); };
        init();
    </script>
</body>
</html>
